name: Deploy (GitHub Pages + Cloudflare Pages)

on:
  # Deploy on every push to the default branch.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3
        with:
          # Astro requires Node >=22.12.0; the action defaults to Node 20,
          # so pin it explicitly (it installs the latest matching 22.x).
          node-version: 22
        # Installs deps, runs `astro build`, uploads ./dist as the Pages artifact.

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Cloudflare Pages runs independently of the GitHub Pages jobs so a failure
  # in one target never blocks the other. It does its own build because the
  # withastro/action artifact is a Pages-specific tarball wrangler can't read.
  cloudflare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build Astro site
        # SITE_URL overrides the canonical domain baked into canonical tags,
        # OG URLs, the sitemap, and RSS so this mirror advertises hackwhite.com.
        run: npm run build
        env:
          SITE_URL: https://hackwhite.com
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./dist --project-name=hackwhite-com --branch=main
